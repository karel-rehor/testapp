version: 2.1

parameters:
  default-node-image:
    type: string
    default: "cimg/node:25.9"
  trigger:
    type: enum
    enum: [none, do-release]
    default: none

commands:
  init-dependencies:
    steps:
      - run:
          name: "Install Dependencies"
          command: npm install

jobs:
  tests:
    docker:
      - image: << pipeline.parameters.default-node-image  >>
    steps:
      - checkout
      - init-dependencies
      - run:
          name: Vanilla Tests
          command: |
            npm run test
  release:
    docker:
      - image: << pipeline.parameters.default-node-image  >>
    steps:
      - checkout
      - run:
          name: Verify Envars
          command: |
            echo From config.yml SUPER_SECRET=\"$SUPER_SECRET\"
      - run:
          name: Release Script
          command: |
            ./scripts/on-release.sh

workflows:
  build:
    jobs:
      - tests
  release:
    when:
      equal: [ do-release, << pipeline.parameters.trigger >> ]
    jobs:
      - tests
      - release